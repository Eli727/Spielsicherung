<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Classic Pac-Man (single file)</title>
  <style>
    :root{--bg:#000;--wall:#001a49;--pellet:#ffd86b;--energ:#ff6b6b;--pac:#ffd34d;--ghost-red:#ff4d4d;--ghost-pink:#ff9fc3;--ghost-cyan:#4dd9ff;--ghost-orange:#ffb86b}
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Arial,Helvetica,sans-serif}
    .container{display:flex;flex-direction:column;align-items:center;padding:12px}
    canvas{image-rendering:pixelated;background:#000;border:6px solid #222;display:block}
    header{display:flex;gap:12px;align-items:center;margin-bottom:8px}
    .info{font-size:14px}
    .controls{font-size:12px;color:#ddd}
    footer{margin-top:8px;color:#bbb;font-size:12px}
    /* main menu styles */
    #mainMenu { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); z-index:1000 }
  #mainMenu .menuBox { background:#111; padding:26px; border:3px solid var(--wall); border-radius:10px; color:#fff; min-width:320px; text-align:center }
    .highscore { font-size:48px; font-weight:700; color:var(--pellet); margin:8px 0 18px 0 }
  .startPlaying { display:inline-block; font-size:20px; font-weight:700; padding:12px 22px; border-radius:8px; border:1px solid #666; cursor:pointer; color:#fff; background:var(--wall); box-shadow: 0 4px 0 rgba(0,0,0,0.25); }
    .personalizeBtn { margin-top:12px; display:inline-block; font-size:14px; padding:8px 12px; border-radius:6px; border:1px solid #666; background:transparent; color:#fff; cursor:pointer }
  /* hearts life display (Minecraft-like) */
  .playRow { display:flex; gap:12px; align-items:flex-start }
  .hearts { display:flex; flex-direction:column; gap:8px; margin-left:8px }
  /* ensure left-side hearts (hearts2) sit with a right margin, not left margin */
  #hearts2 { margin-left: 0; margin-right: 8px; }
  .heart { width:30px; height:30px; transition:opacity 600ms ease, transform 300ms ease; }
  .heart.lost { opacity:0.24; transform:scale(0.9); filter:grayscale(60%); }
  /* short end-of-game animation when pellets run out */
  canvas.ending { transition: transform 700ms ease, filter 700ms ease; transform: scale(1.06) rotate(0.6deg); filter: drop-shadow(0 8px 20px rgba(255,215,0,0.45)); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h2 style="margin:0">Classic Pac-Man (single file)</h2>
      <div class="info">P1: <span id="score">0</span> &nbsp; Lives: <span id="lives">3</span> &nbsp;&nbsp; P2: <span id="score2">0</span> &nbsp; Lives: <span id="lives2">3</span></div>
    </header>
    <div class="playRow">
      <div id="hearts2" class="hearts" aria-hidden="false" title="P2 Lives"></div>
      <canvas id="game" width="616" height="672"></canvas>
      <div id="hearts" class="hearts" aria-hidden="false" title="Lives"></div>
    </div>
    <div class="controls">Use arrow keys to move. Eat all pellets to win. Eat power pellets to eat ghosts.</div>
    <div style="margin-top:8px;display:flex;gap:8px"><button id="pause">Pause</button><button id="restart">Restart</button></div>
    <footer>Open this file in your browser to play.</footer>
  </div>
    <!-- MAIN MENU: shows highscore, start button and opens personalize menu -->
    <div id="mainMenu" style="display:flex">
      <div class="menuBox">
        <h2 style="margin:0 0 8px 0">Classic Pac-Man</h2>
        <div style="font-size:14px;color:#ccc">Local Highscore</div>
        <div id="highscore" class="highscore">0</div>
        <div id="winnerText" style="display:none;margin-top:8px;font-size:16px;color:#ffd86b;font-weight:700"></div>
        <div>
          <button id="startPlayingBtn" class="startPlaying">Start Playing</button>
        </div>
        <div>
          <button id="returnToStartBtn" class="personalizeBtn" style="display:none;margin-top:8px">Return to start</button>
        </div>
        <div>
          <button id="openPersonalizeBtn" class="personalizeBtn">Personalize</button>
        </div>
      </div>
    </div>

    <!-- START OVERLAY: shown before the game. Choose Pac-Man color and start -->
  <div id="startOverlay" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:999">
  <div style="position:relative;background:#111;padding:20px;border:3px solid var(--wall);border-radius:8px;text-align:center;color:#fff;min-width:320px">
        <button id="backArrow" title="Back to main menu" style="position:absolute;left:10px;top:10px;width:36px;height:36px;border-radius:6px;border:1px solid #666;background:transparent;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10">←</button>
        <h2 style="margin:0 0 8px 0">Welcome to Classic Pac-Man</h2>
        <div style="margin-bottom:10px;display:flex;gap:12px;align-items:center;justify-content:center">
          <div style="text-align:center">Choose Pac-Man color:</div>
          <canvas id="pacPreview" width="80" height="80" style="width:80px;height:80px;border-radius:8px;background:#000;display:block;border:1px solid #333"></canvas>
        </div>
        <div id="colorPalette" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
          <!-- 10 specific color choices requested by user: Red, Orange, Yellow, DarkBlue, LightBlue, DarkGreen, LightGreen, Pink, Purple, Brown -->
          <button class="colorBtn" data-color="#ff4d4d" title="Red" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#ff4d4d"></button>
          <button class="colorBtn" data-color="#ffb86b" title="Orange" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#ffb86b"></button>
          <button class="colorBtn" data-color="#ffd34d" title="Yellow" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#ffd34d"></button>
          <button class="colorBtn" data-color="#001f5f" title="Dark Blue" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#001f5f"></button>
          <button class="colorBtn" data-color="#4dd9ff" title="Light Blue" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#4dd9ff"></button>
          <button class="colorBtn" data-color="#006400" title="Dark Green" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#006400"></button>
          <button class="colorBtn" data-color="#a8ff7f" title="Light Green" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#a8ff7f"></button>
          <button class="colorBtn" data-color="#ff9fc3" title="Pink" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#ff9fc3"></button>
          <button class="colorBtn" data-color="#9b59ff" title="Purple" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#9b59ff"></button>
          <button class="colorBtn" data-color="#8b5a2b" title="Brown" style="width:36px;height:36px;border-radius:50%;border:3px solid #fff;background:#8b5a2b"></button>
        </div>
        <div style="margin-top:12px">
          <button id="startBtn" style="display:none">Start Game</button>
        </div>
      </div>
    </div>

    <!-- END OVERLAY (re-uses previous win behavior) -->
    <div id="endOverlay" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:999">
  <div style="background:#111;padding:20px;border:3px solid var(--wall);border-radius:8px;text-align:center;color:#fff;min-width:260px">
        <h2 id="endMsg">You win!</h2>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
          <button id="endToStart">Choose color & Play again</button>
          <button id="endRestartNow">Restart with same color</button>
        </div>
      </div>
    </div>

  <script>
  // Simple single-file Pac-Man implementation.
  // Map legend:
  // '#' wall, '.' pellet, 'o' power pellet, ' ' empty

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');

  // TILE is the pixel size of one map tile; we'll compute it based on the window size so the game scales.
  let TILE = 16; // pixel per tile (initial)
  const COLS = 28; // classic pacman grid width
  const ROWS = 33; // adapt height
  let S = TILE; // shorthand (updated on resize)

  // A small classic-like maze (28x33). This is a simplified, playable map.
  // Constructed as array of strings (each length 28). We use # walls, . pellets, o energizers, ' ' empty
  const rawMap = [
    '############################',
    '#............##............#',
    '#.####.#####.##.#####.####.#',
    '#o####.#####.##.#####.####o#',
    '#.####.#####.##.#####.####.#',
    '#..........................#',
    '#.####.##.########.##.####.#',
    '#.####.##.########.##.####.#',
    '#......##....##....##......#',
    '######.##### ## #####.######',
    '     #.##### ## #####.#     ',
    '     #.##          ##.#     ',
    '     #.## ###--### ##.#     ',
    '######.## ##    ## ##.######',
    '      .   ######## ##       ',
    '######.##          ##.######', 
    '     #.## ######## ##.#     ',
    '     #.##          ##.#     ',
    '     #.## ######## ##.#     ',
    '######.## ######## ##.######',
    '#............##............#',
    '#.####.#####.##.#####.####.#',
    '#o####.#####.##.#####.####o#',
    '#...##................##...#',
    '###.##.##.########.##.##.###',
    '###.##.##.########.##.##.###',
    '#......##....##....##......#',
    '#.##########.##.##########.#',
    '#.##########.##.##########.#',
    '#..........................#',
    '############################',
    '                            ',
    '                            '
  ];

  // Normalize to ROWS length
  while(rawMap.length < ROWS) rawMap.push(' '.repeat(COLS));

  let map = rawMap.map(r => r.split(''));

  // Convert spaces in the 'tunnel' regions at left/right to be open (allow wrap)

  const getTile = (c,r)=> (r>=0 && r<ROWS && c>=0 && c<COLS) ? map[r][c] : '#';
  const wrapX = x => ((x % COLS) + COLS) % COLS;
  const getTileWrapped = (c,r) => {
    if(r<0 || r>=ROWS) return '#';
    return map[r][wrapX(c)];
  };
  const setTile = (c,r,val)=>{ if(r>=0 && r<ROWS && c>=0 && c<COLS) map[r][c]=val };

  // Game state
  let score = 0, lives = 3;
  let score2 = 0, lives2 = 3;
  // pellet bookkeeping
  let pelletsRemaining = 0;
  let pelletsCollected = 0, pelletsCollected2 = 0;
  // keep explicit Pac color references for winner display
  let pac1Color = '#ffd34d';
  let pac2Color = '#4dd9ff';

  // Pac-Man
  // speed is in tiles per second (will be multiplied by deltaTime in seconds)
  // pac.speed is tiles per second — increase to make Pac-Man move faster
  // pac.speed is tiles per second — lowered to make movement slower and more playable
  const pac = { x:13, y:23, dir:{x:0,y:0}, nextDir:{x:0,y:0}, speed:5, radius:5, mouth:90, moving:false, targetX:null, targetY:null, color:'#ffd34d' };

  // Second controllable Pac-Man (WASD)
  const pac2 = { x:14, y:23, dir:{x:0,y:0}, nextDir:{x:0,y:0}, speed:5, radius, mouth:0, moving:false, targetX:null, targetY:null, color:'#4dd9ff', justWrapped: null };

  // Ghosts
  class Ghost {
    constructor(x,y,color,name){
      this.x = x; this.y = y; this.spawnX = x; this.spawnY = y; this.dir = {x:0,y:0};
      this.color = color; this.name = name || ''; this.mode = 'scatter';
      this.vulnerable = false; this.dead = false; this.inHouse = false;
      this.trail = []; this.lastTrailTime = 0;
      // recent tile history to discourage repeating same path
      this.recent = [];
    }
  }

  const ghosts = [
    // spawn ghosts inside the ghost house (rows ~13-15) so they can run out when released
    // moved spawn one tile up (y=13) so ghosts start slightly higher and won't re-enter the house after wrapping
    new Ghost(13,13,'#ff4d4d','Blinky'), // Blinky
    new Ghost(14,13,'#ff9fc3','Pinky'), // Pinky
    new Ghost(12,13,'#4dd9ff','Inky'), // Inky
    new Ghost(15,13,'#ffb86b','Clyde')  // Clyde
  ];

  // Initialize pellets count
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(map[r][c]==='.'||map[r][c]==='o') pelletsRemaining++;

  // game control
  let paused = false;
  let releaseTimers = [];
  let gameStartTime = performance.now();

  // Input handling
  const keys = {};
  window.addEventListener('keydown', e=>{
    keys[e.key]=true; e.preventDefault();
    // also update nextDir immediately so movement feels responsive
    if(e.key==='ArrowLeft') pac.nextDir={x:-1,y:0};
    if(e.key==='ArrowRight') pac.nextDir={x:1,y:0};
    if(e.key==='ArrowUp') pac.nextDir={x:0,y:-1};
    if(e.key==='ArrowDown') pac.nextDir={x:0,y:1};
    // WASD controls for pac2
    if(e.key==='a' || e.key==='A') pac2.nextDir={x:-1,y:0};
    if(e.key==='d' || e.key==='D') pac2.nextDir={x:1,y:0};
    if(e.key==='w' || e.key==='W') pac2.nextDir={x:0,y:-1};
    if(e.key==='s' || e.key==='S') pac2.nextDir={x:0,y:1};
    trySetNextDir();
    trySetNextDir2();
  });
  window.addEventListener('keyup', e=>{ keys[e.key]=false; });

  // ensure the document has focus so keyboard events are received; focus body on load and when clicking canvas
  window.addEventListener('load', ()=>{ try{ document.body.tabIndex = -1; document.body.focus(); }catch(e){} });
  canvas.addEventListener('click', ()=>{ try{ document.body.focus(); }catch(e){} });

  // Touch / swipe controls for iPad: swipe on the canvas to change Pac-Man direction
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
  const SWIPE_THRESHOLD = 30; // pixels
  canvas.addEventListener('touchstart', e=>{
    if(e.touches && e.touches.length>0){
      const t = e.touches[0];
      touchStartX = t.clientX; touchStartY = t.clientY; touchStartTime = performance.now();
    }
  }, {passive:false});
  canvas.addEventListener('touchmove', e=>{
    // prevent page from scrolling while swiping on the canvas
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', e=>{
    if(!e.changedTouches || e.changedTouches.length===0) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
    // ignore tiny taps
    if(Math.hypot(dx,dy) < SWIPE_THRESHOLD) return;
    if(Math.abs(dx) > Math.abs(dy)){
      // horizontal swipe
      if(dx > 0) pac.nextDir = {x:1,y:0}; else pac.nextDir = {x:-1,y:0};
    } else {
      // vertical swipe
      if(dy > 0) pac.nextDir = {x:0,y:1}; else pac.nextDir = {x:0,y:-1};
    }
    trySetNextDir();
  }, {passive:false});

  // Responsive canvas: compute TILE size to fit the window while preserving aspect ratio
  function resizeCanvas(){
    // margins for UI chrome
    const marginX = 40; // left+right approx
    const marginY = 140; // header + footer + controls
    const availW = Math.max(200, window.innerWidth - marginX);
    const availH = Math.max(200, window.innerHeight - marginY);
    // compute tile size so the whole map fits
    let tile = Math.floor(Math.min(availW / COLS, availH / ROWS));
    if(tile < 6) tile = 6;
    TILE = tile;
    S = TILE;
    // set canvas pixel dimensions
    canvas.width = COLS * TILE;
    canvas.height = ROWS * TILE;
    // set CSS so it remains crisp and centered
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    canvas.style.maxWidth = '100%';
    canvas.style.height = 'auto';
  }
  window.addEventListener('resize', resizeCanvas);
  // compute initial size
  resizeCanvas();

  function trySetNextDir(){
    const d = pac.nextDir;
    if(!d) return;
    // Only allow turning when Pac is at (or very near) the center of a tile (an intersection)
    if(atCenter(pac) || !pac.moving){
      const cx = Math.round(pac.x), cy = Math.round(pac.y);
      const nx = cx + d.x, ny = cy + d.y;
      if(canMoveTo(nx,ny)) pac.dir = {...d};
    }
  }

  // same for pac2 (WASD)
  function trySetNextDir2(){
    const d = pac2.nextDir;
    if(!d) return;
    if(atCenter(pac2) || !pac2.moving){
      const cx = Math.round(pac2.x), cy = Math.round(pac2.y);
      const nx = cx + d.x, ny = cy + d.y;
      if(canMoveTo(nx,ny)) pac2.dir = {...d};
    }
  }

  function canMoveTo(x,y){
    // allow horizontal wrapping: check wrapped tile for walls
    const cx = Math.round(x);
    const cy = Math.round(y);
    return getTileWrapped(cx,cy) !== '#';
  }

  function updateInput(){
  // support arrow keys for pac
  if(keys['ArrowLeft']) pac.nextDir={x:-1,y:0};
  if(keys['ArrowRight']) pac.nextDir={x:1,y:0};
  if(keys['ArrowUp']) pac.nextDir={x:0,y:-1};
  if(keys['ArrowDown']) pac.nextDir={x:0,y:1};
    // try to apply the queued direction so holding a key works even if keydown was missed
    trySetNextDir();
    // pac2 WASD (ensure separate key mapping)
    if(keys['a'] || keys['A']) pac2.nextDir={x:-1,y:0};
    if(keys['d'] || keys['D']) pac2.nextDir={x:1,y:0};
    if(keys['w'] || keys['W']) pac2.nextDir={x:0,y:-1};
    if(keys['s'] || keys['S']) pac2.nextDir={x:0,y:1};
    trySetNextDir2();
  }

  function wrapPos(entity){
    // allow smooth horizontal tunnel-wrap when moving beyond edges
    // wrap only when the row at the edge is open (tunnel); otherwise clamp
    const row = Math.round(entity.y);
    const now = performance.now();
    const wrapCooldown = 300; // ms
    // helper to detect if this entity should attempt to continue movement after wrap
    const isMover = ('moving' in entity) && ('dir' in entity) && ('nextDir' in entity);

    if(entity.x < -0.5){
      if(canMoveTo(COLS-1, row)){
        if(entity.justWrapped && (now - entity.justWrapped) < wrapCooldown) return;
        entity.x = COLS - 0.5;
        if(isMover){
          entity.justWrapped = now;
          const prefer = (entity.nextDir && (entity.nextDir.x||entity.nextDir.y)) ? entity.nextDir : entity.dir;
          const cx = Math.round(entity.x), cy = Math.round(entity.y);
          const tx = cx + (prefer ? prefer.x : 0), ty = cy + (prefer ? prefer.y : 0);
          if(prefer && canMoveTo(tx, ty)){
            entity.dir = {...prefer}; entity.targetX = tx; entity.targetY = ty; entity.moving = true;
          } else {
            entity.moving = false;
          }
        }
      } else entity.x = Math.max(entity.x, 0);
    }
    if(entity.x > COLS - 0.5){
      if(canMoveTo(0, row)){
        if(entity.justWrapped && (now - entity.justWrapped) < wrapCooldown) return;
        entity.x = -0.5;
        if(isMover){
          entity.justWrapped = now;
          const prefer = (entity.nextDir && (entity.nextDir.x||entity.nextDir.y)) ? entity.nextDir : entity.dir;
          const cx = Math.round(entity.x), cy = Math.round(entity.y);
          const tx = cx + (prefer ? prefer.x : 0), ty = cy + (prefer ? prefer.y : 0);
          if(prefer && canMoveTo(tx, ty)){
            entity.dir = {...prefer}; entity.targetX = tx; entity.targetY = ty; entity.moving = true;
          } else {
            entity.moving = false;
          }
        }
      } else entity.x = Math.min(entity.x, COLS-1);
    }
    // do not vertically wrap in this map (classic Pac-Man only wraps horizontally)
  }

  function updatePac(dt){
    // Grid-based movement: Pac-Man moves tile by tile.
    // dt in ms -> seconds
    const dtSec = dt/1000;

    // If not currently moving between tiles, try to start a move
    if(!pac.moving){
      // trySetNextDir is called from input; pac.dir should already be set to desired direction
      const cx = Math.round(pac.x), cy = Math.round(pac.y);
      if((pac.dir.x !== 0 || pac.dir.y !== 0)){
        const tx = cx + pac.dir.x, ty = cy + pac.dir.y;
        if(canMoveTo(tx, ty)){
          pac.targetX = tx; pac.targetY = ty; pac.moving = true;
        } else if(pac.nextDir && (pac.nextDir.x !== 0 || pac.nextDir.y !== 0)){
          const nx = cx + pac.nextDir.x, ny = cy + pac.nextDir.y;
          if(canMoveTo(nx, ny)){
            pac.dir = {...pac.nextDir}; pac.targetX = nx; pac.targetY = ny; pac.moving = true;
          }
        }
      }
    }

    // If moving, interpolate towards target tile
    if(pac.moving){
      const dx = pac.targetX - pac.x, dy = pac.targetY - pac.y;
      const dist = Math.hypot(dx, dy);
      const move = pac.speed * dtSec;
      if(dist <= move || dist < 1e-6){
        // Arrive exactly at target
        pac.x = pac.targetX; pac.y = pac.targetY; pac.moving = false;
        // clear wrap guard once we've arrived at a tile after a wrap
        if(pac.justWrapped) pac.justWrapped = null;
        // handle tile arrival: pellets, energizers
        const t = getTile(Math.round(pac.x), Math.round(pac.y));
        if(t=='.'){ score += 10; setTile(Math.round(pac.x),Math.round(pac.y),' '); pelletsRemaining--; pelletsCollected++; }
        if(t=='o'){ score += 50; setTile(Math.round(pac.x),Math.round(pac.y),' '); pelletsRemaining--; pelletsCollected++; 
          ghosts.forEach(g=>{ if(!g.dead){ g.vulnerable=true; setTimeout(()=>{ g.vulnerable=false; },7000); } });
        }
        // After arriving, attempt to continue moving in nextDir first, then current dir
        const cx = Math.round(pac.x), cy = Math.round(pac.y);
        if(pac.nextDir && (pac.nextDir.x !== 0 || pac.nextDir.y !== 0) && canMoveTo(cx + pac.nextDir.x, cy + pac.nextDir.y)){
          pac.dir = {...pac.nextDir}; pac.targetX = cx + pac.dir.x; pac.targetY = cy + pac.dir.y; pac.moving = true;
        } else if(pac.dir && (pac.dir.x !== 0 || pac.dir.y !== 0) && canMoveTo(cx + pac.dir.x, cy + pac.dir.y)){
          pac.targetX = cx + pac.dir.x; pac.targetY = cy + pac.dir.y; pac.moving = true;
        }
      } else {
        // move proportionally towards the target
        pac.x += (dx/dist) * move;
        pac.y += (dy/dist) * move;
      }
    } else {
      // not moving; we may still be slightly off-center - snap to nearest tile center slowly
      pac.x = pac.x; pac.y = pac.y;
    }
    // wrap at tunnels (conditional)
    wrapPos(pac);

    // animate mouth
    pac.mouth += 6 * dtSec;
  }

  // Update movement for pac2 (similar grid-based movement)
  function updatePac2(dt){
    const dtSec = dt/1000;
    // try to start movement if we're not already moving
    if(!pac2.moving){

      d.innerHTML = '<svg viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg" width="30" height="30"><path fill="#ff4d4d" d="M23.6 0c-2.7 0-5.1 1.4-6.6 3.6C15.5 1.4 13.1 0 10.4 0 4.7 0 0 4.8 0 10.7 0 18.9 9.4 23.7 16 29c6.6-5.3 16-10.1 16-18.3C32 4.8 27.3 0 23.6 0z"/></svg>';
      heartsEl.appendChild(d);
    }
  }
  function updateHearts(){ if(!heartsEl) return; const list = Array.from(heartsEl.children); list.forEach((el,i)=>{ if(i < lives) el.classList.remove('lost'); else el.classList.add('lost'); }); }
  function renderHearts2(){
    if(!heartsEl2) return;
    heartsEl2.innerHTML = '';
    for(let i=0;i<maxLives;i++){
      const d = document.createElement('div'); d.className = 'heart' + (i>=lives2 ? ' lost' : '');
      d.innerHTML = '<svg viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg" width="30" height="30"><path fill="#ff4d4d" d="M23.6 0c-2.7 0-5.1 1.4-6.6 3.6C15.5 1.4 13.1 0 10.4 0 4.7 0 0 4.8 0 10.7 0 18.9 9.4 23.7 16 29c6.6-5.3 16-10.1 16-18.3C32 4.8 27.3 0 23.6 0z"/></svg>';
      heartsEl2.appendChild(d);
    }
  }
  function updateHearts2(){ if(!heartsEl2) return; const list = Array.from(heartsEl2.children); list.forEach((el,i)=>{ if(i < lives2) el.classList.remove('lost'); else el.classList.add('lost'); }); }

  function showStartOverlay(){
    startOverlay.style.display = 'flex';
    paused = true; pauseBtn.textContent = 'Resume';
  }
  function hideStartOverlay(){ startOverlay.style.display = 'none'; }

  function showEndOverlay(msg){
    // update highscore if needed
    const prev = loadHighscore();
    if(score > prev){ saveHighscore(score); }
    endMsg.textContent = msg;
    endOverlay.style.display = 'flex';
    paused = true; pauseBtn.textContent = 'Resume';
    // refresh main menu display if it exists
    if(highscoreEl) highscoreEl.textContent = loadHighscore();
  }
  function hideEndOverlay(){ endOverlay.style.display = 'none'; }

  // color selection
  function selectColorBtn(btn){
    colorButtons.forEach(b=> b.style.outline = '');
    btn.style.outline = '3px solid #fff';
    const c = btn.getAttribute('data-color');
  pac.color = c;
  pac1Color = c;
    // update preview display
    drawPreview();
    // persist choice (Start button stays wall-blue)
    saveColor(pac.color);
  }
  // Pac preview canvas drawing will be initialized after DOM is ready
  function drawPreview(){
    if(!pCtx) return;
    const W = previewCanvas.width, H = previewCanvas.height;
    pCtx.clearRect(0,0,W,H);
    // draw a Pac-Man in center
    const cx = W/2, cy = H/2, r = Math.min(W,H) * 0.32;
    const mouthAngle = 0.5; // static preview mouth
    pCtx.save();
    pCtx.translate(cx, cy);
    pCtx.fillStyle = pac.color || '#ffd34d';
    pCtx.beginPath(); pCtx.moveTo(0,0); pCtx.arc(0,0,r,mouthAngle,-mouthAngle); pCtx.closePath(); pCtx.fill();
    pCtx.restore();
    // border
    pCtx.strokeStyle = 'rgba(255,255,255,0.06)'; pCtx.lineWidth = 2; pCtx.strokeRect(0,0,W,H);
  }
  // initial preview draw
  drawPreview();
  // wire DOM elements and events once DOM is ready
  window.addEventListener('DOMContentLoaded', ()=>{
    startOverlay = document.getElementById('startOverlay');
    startBtn = document.getElementById('startBtn');
    colorPalette = document.getElementById('colorPalette');
    colorButtons = Array.from(document.querySelectorAll('.colorBtn'));
    endOverlay = document.getElementById('endOverlay');
    endMsg = document.getElementById('endMsg');
    endToStart = document.getElementById('endToStart');
    endRestartNow = document.getElementById('endRestartNow');
  previewCanvas = document.getElementById('pacPreview');
  pCtx = previewCanvas && previewCanvas.getContext ? previewCanvas.getContext('2d') : null;
  backArrow = document.getElementById('backArrow');
    // main menu elements
    mainMenu = document.getElementById('mainMenu');
    startPlayingBtn = document.getElementById('startPlayingBtn');
    openPersonalizeBtn = document.getElementById('openPersonalizeBtn');
    highscoreEl = document.getElementById('highscore');

  // hearts UI
  heartsEl = document.getElementById('hearts');
  heartsEl2 = document.getElementById('hearts2');
  maxLives = Math.max(lives, 3);
  renderHearts(); updateHearts();
  renderHearts2(); updateHearts2();

    // load persisted color and highscore
    const savedColor = loadSavedColor();
    if(savedColor){ pac.color = savedColor; }
  // ensure pac1Color/pac2Color reflect live colors
  pac1Color = pac.color || pac1Color;
  pac2Color = pac2.color || pac2Color;

    // attach color button handlers
    colorButtons.forEach(b=> b.addEventListener('click', ()=> selectColorBtn(b)));
    // init selection to default
    // if we have a saved color, select its button; otherwise default to first
    if(colorButtons.length){
      let matched = null;
      if(savedColor) matched = colorButtons.find(b=> b.getAttribute('data-color') === savedColor);
      if(matched) selectColorBtn(matched); else selectColorBtn(colorButtons[0]);
    }

    // draw initial preview
    drawPreview();

  // show the main menu once elements and handlers are ready
  // update start button color to match pac.color
  updateMainMenuColor(pac.color);
  showMainMenu();

    // start button
  if(startBtn) startBtn.addEventListener('click', ()=>{
      // start fresh game with chosen color from personalize overlay
      // persist chosen color
      saveColor(pac.color);
      hideStartOverlay(); hideMainMenu(); paused = false; pauseBtn.textContent = 'Pause';
  score = 0; lives = 3; scoreEl.textContent = score; livesEl.textContent = lives; updateHearts();
  score2 = 0; lives2 = 3; const scoreEl2 = document.getElementById('score2'); if(scoreEl2) scoreEl2.textContent = score2; const livesEl2 = document.getElementById('lives2'); if(livesEl2) livesEl2.textContent = lives2; updateHearts2(); pelletsCollected = 0; pelletsCollected2 = 0;
      map = rawMap.map(r=>r.split(''));
      pelletsRemaining = 0; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(map[r][c]==='.'||map[r][c]==='o') pelletsRemaining++;
      resetPositions();
    });

  // back from personalize overlay to main menu (arrow button in top-left)
  if(backArrow) backArrow.addEventListener('click', ()=>{ hideStartOverlay(); showMainMenu(); });

    // start button on main menu
    if(startPlayingBtn) startPlayingBtn.addEventListener('click', ()=>{
      saveColor(pac.color);
      hideMainMenu(); paused = false; pauseBtn.textContent = 'Pause';
      score = 0; lives = 3; scoreEl.textContent = score; livesEl.textContent = lives; updateHearts();
  score2 = 0; lives2 = 3; const scoreEl2 = document.getElementById('score2'); if(scoreEl2) scoreEl2.textContent = score2; const livesEl2 = document.getElementById('lives2'); if(livesEl2) livesEl2.textContent = lives2; updateHearts2(); pelletsCollected = 0; pelletsCollected2 = 0;
      map = rawMap.map(r=>r.split(''));
      pelletsRemaining = 0; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(map[r][c]==='.'||map[r][c]==='o') pelletsRemaining++;
      resetPositions();
    });

    // open personalize (show color palette) from main menu
    if(openPersonalizeBtn) openPersonalizeBtn.addEventListener('click', ()=>{ hideMainMenu(); startOverlay.style.display = 'flex'; paused = true; pauseBtn.textContent = 'Resume'; });

    // end overlay buttons
    if(endToStart) endToStart.addEventListener('click', ()=>{ hideEndOverlay(); showMainMenu(); });
    if(endRestartNow) endRestartNow.addEventListener('click', ()=>{
      hideEndOverlay(); paused = false; pauseBtn.textContent = 'Pause';
      score = 0; lives = 3; scoreEl.textContent = score; livesEl.textContent = lives; updateHearts();
  score2 = 0; lives2 = 3; const scoreEl2 = document.getElementById('score2'); if(scoreEl2) scoreEl2.textContent = score2; const livesEl2 = document.getElementById('lives2'); if(livesEl2) livesEl2.textContent = lives2; updateHearts2(); pelletsCollected = 0; pelletsCollected2 = 0;
      map = rawMap.map(r=>r.split(''));
      pelletsRemaining = 0; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(map[r][c]==='.'||map[r][c]==='o') pelletsRemaining++;
      resetPositions();
    });
  });

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // scale so that tile size is TILE
    ctx.save();
    ctx.scale(TILE, TILE);

    // Draw map
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const t = getTile(c,r);
        const x = c, y = r;
        if(t==='#'){
          ctx.fillStyle = '#001a49';
          ctx.fillRect(x, y, 1, 1);
          // inner shading
          ctx.fillStyle = '#001f5f';
          ctx.fillRect(x+0.08, y+0.08, 0.84, 0.84);
        } else if(t==='.' ){
          ctx.fillStyle = '#ffd86b'; ctx.beginPath(); ctx.arc(x+0.5,y+0.5,0.08,0,Math.PI*2); ctx.fill();
        } else if(t==='o'){
          ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(x+0.5,y+0.5,0.20,0,Math.PI*2); ctx.fill();
        }
      }
    }

    // Draw ghosts (including Pinky trail)
    ghosts.forEach(g=>{
      // draw Pinky's trail behind her
      if(g.name === 'Pinky' && g.trail && g.trail.length){
        const now = performance.now();
        const trailLifetime = 900; // ms
        for(let i=0;i<g.trail.length;i++){
          const e = g.trail[i];
          const age = now - e.t;
          const a = 1 - (age / trailLifetime);
          if(a <= 0) continue;
          // pink to white fade: interpolate RGB
          const pink = [255,159,195]; // #ff9fc3
          const white = [255,255,255];
          const r = Math.round(pink[0] * a + white[0] * (1-a));
          const gcol = Math.round(pink[1] * a + white[1] * (1-a));
          const b = Math.round(pink[2] * a + white[2] * (1-a));
          ctx.fillStyle = `rgba(${r},${gcol},${b},${0.6*a})`;
          ctx.beginPath(); ctx.arc(e.x+0.5, e.y+0.5, 0.14 * (a+0.3), 0, Math.PI*2); ctx.fill();
        }
      }
      ctx.save(); ctx.translate(g.x+0.5,g.y+0.5);
      // Blinky neon blink when normal
      if(g.dead) ctx.fillStyle='#111';
      else if(g.vulnerable) ctx.fillStyle='#4da6ff';
      else if(g.name === 'Blinky'){
        const blinkOn = Math.floor(performance.now()/200) % 2 === 0;
        ctx.fillStyle = blinkOn ? '#39ff14' : g.color; // neon green blink
      } else ctx.fillStyle = g.color;
      // simple ghost shape
      ctx.beginPath(); ctx.arc(0,0,0.45,Math.PI,0); ctx.lineTo(0.45,0.45); ctx.quadraticCurveTo(0.3,0.2,0.15,0.45); ctx.quadraticCurveTo(0.0,0.2,-0.15,0.45); ctx.quadraticCurveTo(-0.3,0.2,-0.45,0.45); ctx.closePath(); ctx.fill();
      // eyes
      ctx.fillStyle = g.vulnerable? '#fff' : '#fff'; ctx.beginPath(); ctx.ellipse(-0.12,-0.05,0.08,0.12,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(0.12,-0.05,0.08,0.12,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(-0.12+ (g.dir.x*0.05),-0.05+(g.dir.y*0.05),0.03,0.05,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(0.12+(g.dir.x*0.05),-0.05+(g.dir.y*0.05),0.03,0.05,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // Draw Pac-Man
  ctx.save(); ctx.translate(pac.x+0.5,pac.y+0.5);
  const mouthAngle = Math.abs(Math.sin(pac.mouth*0.15)) * 0.6;
  let dirAngle = 0; if(pac.dir.x===1) dirAngle=0; if(pac.dir.x===-1) dirAngle=Math.PI; if(pac.dir.y===1) dirAngle=Math.PI/2; if(pac.dir.y===-1) dirAngle=-Math.PI/2;
  ctx.rotate(dirAngle);
  ctx.fillStyle = pac.color || '#ffd34d'; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,0.45,mouthAngle,-mouthAngle); ctx.closePath(); ctx.fill();
  ctx.restore();

  // Draw second Pac-Man (pac2)
  ctx.save(); ctx.translate(pac2.x+0.5,pac2.y+0.5);
  const mouthAngle2 = Math.abs(Math.sin(pac2.mouth*0.18)) * 0.55;
  let dirAngle2 = 0; if(pac2.dir.x===1) dirAngle2=0; if(pac2.dir.x===-1) dirAngle2=Math.PI; if(pac2.dir.y===1) dirAngle2=Math.PI/2; if(pac2.dir.y===-1) dirAngle2=-Math.PI/2;
  ctx.rotate(dirAngle2);
  ctx.fillStyle = pac2.color || '#4dd9ff'; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,0.36,mouthAngle2,-mouthAngle2); ctx.closePath(); ctx.fill();
  ctx.restore();

    ctx.restore();
  }

  let last = performance.now();
  function loop(t){
    const dt = Math.min(40, t - last); last = t;
    if(!paused){
      updateInput();
      updatePac(dt);
      updatePac2(dt);
      updateGhosts(dt);
      checkCollisions();
    }
    scoreEl.textContent = score;
    // update second score element if present
    const scoreEl2 = document.getElementById('score2'); if(scoreEl2) scoreEl2.textContent = score2;
    draw();
    if(pelletsRemaining<=0){
      // Play a short canvas flourish animation, pause briefly, then decide winner
      const canv = document.getElementById('game');
      if(canv){ canv.classList.add('ending'); }
      paused = true;
      setTimeout(()=>{
        if(canv){ canv.classList.remove('ending'); }
        // decide winner, never allow a dead Pac (lives<=0) to win
        let winnerText = '';
        let winnerId = null;
        if(typeof score2 === 'undefined'){
          winnerText = 'Player 1 wins!'; winnerId = 'p1';
        } else {
          if(lives <= 0 && lives2 > 0){ winnerText = 'Player 2 wins!'; winnerId = 'p2'; }
          else if(lives2 <= 0 && lives > 0){ winnerText = 'Player 1 wins!'; winnerId = 'p1'; }
          else if(lives <= 0 && lives2 <= 0){ winnerText = 'It\'s a tie!'; winnerId = 'tie'; }
          else if(pelletsCollected > pelletsCollected2) { winnerText = 'Player 1 wins by pellets!'; winnerId='p1'; }
          else if(pelletsCollected2 > pelletsCollected) { winnerText = 'Player 2 wins by pellets!'; winnerId='p2'; }
          else if(lives > lives2) { winnerText = 'Player 1 wins by lives!'; winnerId='p1'; }
          else if(lives2 > lives) { winnerText = 'Player 2 wins by lives!'; winnerId='p2'; }
          else if(score > score2) { winnerText = 'Player 1 wins by score!'; winnerId='p1'; }
          else if(score2 > score) { winnerText = 'Player 2 wins by score!'; winnerId='p2'; }
          else { winnerText = 'It\'s a tie!'; winnerId = 'tie'; }
        }
        // Save highscores
        const prev = loadHighscore(); if(score > prev) saveHighscore(score);
        if(typeof loadHighscore2 === 'function'){ const prev2 = loadHighscore2(); if(typeof saveHighscore2 === 'function' && typeof score2 !== 'undefined' && score2 > prev2) saveHighscore2(score2); }
        showMainMenuWithWinner({ title: winnerText, winner: winnerId, stats: { score1: score, score2: score2, pellets1: pelletsCollected, pellets2: pelletsCollected2, lives1: lives, lives2: lives2 }, colors: { p1: pac1Color, p2: pac2Color } });
      }, 700);
    }
    requestAnimationFrame(loop);
  }

  // initializations
  resetPositions();
  scoreEl.textContent = score; livesEl.textContent = lives; updateHearts();
  // start the game loop; overlay will be shown once DOM is ready
  requestAnimationFrame(loop);
  </script>
</body>
